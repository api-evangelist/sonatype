aid: sonatype
name: Sonatype
description: >-
  These high availability clustering-specific REST endpoints allow the user to
  inspect and manipulate the state of a node in an Orient database cluster. The
  expectation is that these will be used mainly for troubleshooting and recovery
  operations. 
